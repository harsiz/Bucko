client_version: 2

ui:
  default_next_label: "NEXT"
  typewriter_speed: 0.03 # seconds per character
  window_width: 900
  window_height: 650
  theme: "darkly" # ttkbootstrap theme
  auto_advance_delay: 0.55 # seconds to auto-advance between lines in a block (0 = require NEXT per line)
  thinking_delay_ms: 350 # ms before Bucko starts responding after user input

mood:
  baseline:
    energy: 70
    patience: 80
    chaos: 40
    warmth: 75
  decay_rate: 1 # units per minute back toward baseline

discord_rpc:
  enabled: true
  app_id: "1492519409343004763"

# Idle timeout in minutes. If the user hasn't typed anything for this long,
# Bucko will send a random dialogue block marked with `idle: true`.
# Set to 0 (or remove) to disable.
idle_timeout_minutes: 0
